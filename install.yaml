# Details about the install.yaml file are at https://ddev.readthedocs.io/en/stable/users/extend/additional-services/#sections-and-features-of-ddev-get-add-on-installyaml

name: tideways

# Files copied into the project's .ddev directory.
# Each file contains a #ddev-generated marker so it can be replaced by a later
# `ddev add-on get` if it has not been modified by the user, and removed by
# `ddev add-on remove`.
project_files:
  - docker-compose.tideways.yaml
  - web-build/Dockerfile.tideways
  - commands/web/tideways
  - commands/host/tideways-doctor

# Nothing is installed into the global ~/.ddev directory.
global_files:

# Validated against the running DDEV executable; install is blocked otherwise.
ddev_version_constraint: '>= v1.24.0'

dependencies:

# post_install_actions are executed in the context of the target project's .ddev directory.
post_install_actions:
  - |
    #ddev-description:Remind about the Tideways API key
    if ! grep -rqs '^TIDEWAYS_APIKEY=.\+' .env.tideways 2>/dev/null; then
      echo "Tideways: set your API key, then restart:"
      echo "  ddev dotenv set .ddev/.env.tideways --tideways-apikey=YOUR_KEY"
      echo "  ddev restart"
      echo "Optional: --tideways-environment=staging (default: DDEV)"
    fi

# Files listed in project_files are removed automatically if they contain #ddev-generated.
removal_actions:
